# =============================================================
# TrafficFlow — Render Deployment Configuration (Docker)
# =============================================================

services:
  - type: web
    name: trafficflow
    runtime: docker
    region: singapore
    plan: standard
    
    # Docker build context is the repo root
    dockerfilePath: ./Dockerfile
    
    # Health check endpoint
    healthCheckPath: /api/health
    
    # Environment variables
    envVars:
      - key: TRAFFICFLOW_OCR_DEBUG
        value: "0"
      - key: DEFAULT_CUSTOMER_PHONE
        value: "+919876543210"
      - key: TRAFFICFLOW_MAX_INFERENCE_WIDTH
        value: "640"
      - key: YOLO_CONFIG_DIR
        value: "/tmp/Ultralytics"
      - key: FLASK_ENV
        value: "production"
      # Set these in the Render Dashboard → Environment:
      # DATABASE_URL  →  use the Internal PostgreSQL URL from Render DB
      # PUBLIC_BASE_URL  →  https://<your-service-name>.onrender.com
      # CHALLAN_PAYMENT_URL  →  https://<your-service-name>.onrender.com/challan
      # PLATE_MODEL_GDRIVE_ID  →  Google Drive file ID for yolov8n_license_plate.pt
